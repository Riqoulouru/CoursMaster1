services:
  postgres:
    image: postgres:16
    container_name: postgres-cours-basile
    restart: unless-stopped
    environment:
      POSTGRES_DB: coursBasile
      POSTGRES_USER: user
      POSTGRES_PASSWORD: Pass2026!
    ports:
      - "5432:5432"
    volumes:
      - postgres_cours_basile_data:/var/lib/postgresql/data

volumes:
  postgres_cours_basile_data: